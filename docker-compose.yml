version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: real_estate_triage
    ports:
      - "3306:3306"
    volumes:
      # This automatically runs your SQL file when the database starts!
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=real_estate_triage
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db

volumes:
  db_data:
